services:
  - type: web
    name: saatdin-backend
    runtime: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EXPOSE_DEBUG_OTP
        value: "false"
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_ORIGIN_REGEX
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
